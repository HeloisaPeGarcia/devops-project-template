name: Auto PR for Feature and Fix Branches

on:
  push:
    branches:
      - 'FIX'
      - 'fix*'
      - 'hotfix/*'
      - 'feature/*'
      - 'feat/*'

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Build
        run: docker build -t app .

      - name: Testes
        run: docker run app npm test

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --state open --head "${{ github.ref_name }}" --json number --jq 'length')
          echo "prs_count=$prs" >> $GITHUB_OUTPUT

      - name: Criar Pull Request
        if: steps.check_pr.outputs.prs_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" =~ ^(feature/|feat/) ]]; then
            TITLE="Feat: ${{ github.ref_name }}"
            BODY="Pull request automático criado pela pipeline para a branch de funcionalidade ${{ github.ref_name }}."
          else
            TITLE="Fix: ${{ github.ref_name }}"
            BODY="Pull request automático criado pela pipeline para a branch de correção ${{ github.ref_name }}."
          fi
          
          echo "Criando Pull Request..."
          gh pr create --title "$TITLE" --body "$BODY" --base main --head "${{ github.ref_name }}"
