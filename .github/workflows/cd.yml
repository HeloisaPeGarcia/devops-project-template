name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy-staging:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set lower case owner and repository name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }} .
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push para GHCR
        run: docker push ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
      - name: Deploy K8s (Mock/Exemplo)
        run: |
          echo "Simulando deploy no Kubernetes..."
          echo "kubectl set image deployment/app app=ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}"

  deploy-prod:
    environment: production
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        run: echo "Deploying to production..."
        # Add production deployment steps here
